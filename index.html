<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiffCheck - Online File Comparison</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <meta name="description"
        content="Compare two versions of a file and highlight differences with ease. Fast, secure, and user-friendly.">
    <link rel="stylesheet" href="assets/style.css">
    <!-- <link rel="stylesheet" href="assets/font-awesome.min.css"> -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
        integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-ruby.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-xml-doc.min.js"></script>
</head>

<body>
    <header>
        <div class="header-content">
            <h1><a href="index.html" class="typing-header" style="text-decoration: none;">DiffCheck...</a></h1>
            <button id="themeToggle" class="theme-toggle" title="Toggle dark/light mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
        <p class="subtitle" data-aos="fade-down" data-aos-delay="400">Securely compare code and text with precision</p>
    </header>

    <main>
        <div id="progressIndicator" class="progress-indicator" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <span class="progress-text">Comparing...</span>
        </div>
        <div class="comparison-grid" data-aos="fade-up" data-aos-duration="600">
            <div class="editor-container">
                <div class="editor-header">
                    <h3>Original File</h3>
                    <div class="file-input-wrapper">
                        <span class="upload-link">Upload File</span>
                        <input type="file" id="file1"
                            accept=".txt,.js,.jsx,.ts,.tsx,.css,.html,.json,.md,.py,.java,.c,.cpp,.h,.hpp,.cs,.go,.rs,.php,.rb,.sh,.sql,.yaml,.yml,.xml,.toml,.ini,.conf,.log,.csv">
                    </div>
                </div>
                <textarea id="text1" placeholder="Paste your original text or upload a file..."></textarea>
            </div>

            <div class="editor-container">
                <div class="editor-header">
                    <h3>Modified File</h3>
                    <div class="file-input-wrapper">
                        <span class="upload-link">Upload File</span>
                        <input type="file" id="file2"
                            accept=".txt,.js,.jsx,.ts,.tsx,.css,.html,.json,.md,.py,.java,.c,.cpp,.h,.hpp,.cs,.go,.rs,.php,.rb,.sh,.sql,.yaml,.yml,.xml,.toml,.ini,.conf,.log,.csv">
                    </div>
                </div>
                <textarea id="text2" placeholder="Paste your modified text or upload a file..."></textarea>
            </div>
        </div>

        <div class="controls" data-aos="slide-up" data-aos-duration="600">
            <div class="options-group">
                <label class="option">
                    <input type="checkbox" id="ignoreWhitespace">
                    Ignore Whitespace
                </label>
                <label class="option">
                    <input type="checkbox" id="ignoreCase">
                    Ignore Case
                </label>
                <label class="option">
                    <input type="checkbox" id="showOnlyChanges">
                    Show Only Changes
                </label>
                <label class="option">
                    <input type="checkbox" id="unifiedView">
                    Unified View
                </label>
            </div>
            <div class="button-group">
                <button id="swapBtn" class="btn btn-secondary" title="Swap files (Ctrl/Cmd+Shift+S)">
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                    Swap
                </button>
                <button id="compareBtn" class="btn" title="Compare (Ctrl/Cmd+Enter)">
                    <i class="fa-solid fa-code-compare"></i>
                    Compare
                </button>
                <button id="clearBtn" class="btn btn-secondary" title="Clear contents">
                    <i class="fa-solid fa-broom"></i>
                    Clear
                </button>
            </div>
        </div>

        <div id="diffResult" class="diff-output">
            <div class="diff-stats-header">
                <div class="stat-box">
                    <div class="stat-label">
                        <span style="color: var(--diff-removed-border)">⊖</span>
                        <span id="removalStats">0 removals</span>
                    </div>
                    <button class="btn-copy" onclick="copyText('text1', this)">Copy</button>
                </div>
                <div class="stat-box">
                    <div class="stat-label">
                        <span style="color: var(--diff-added-border)">⊕</span>
                        <span id="additionStats">0 additions</span>
                    </div>
                    <button class="btn-copy" onclick="copyText('text2', this)">Copy</button>
                </div>
            </div>
            <div class="diff-actions">
                <button id="prevChange" class="nav-btn" title="Previous change (Alt+Up)">
                    <i class="fa-solid fa-chevron-up"></i>
                </button>
                <span id="changeCounter" class="change-counter">0 / 0</span>
                <button id="nextChange" class="nav-btn" title="Next change (Alt+Down)">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <div class="diff-export">
                    <button id="copyDiff" class="btn-export" title="Copy diff to clipboard">
                        <i class="fa-solid fa-copy"></i> Copy Diff
                    </button>
                    <button id="downloadDiff" class="btn-export" title="Download diff as file">
                        <i class="fa-solid fa-download"></i> Download
                    </button>
                </div>
            </div>
            <div class="diff-side-by-side">
                <div id="diffLeft" class="diff-pane"></div>
                <div id="diffRight" class="diff-pane"></div>
            </div>
            <div id="unifiedDiff" class="diff-unified" style="display: none;"></div>
        </div>
    </main>

    <footer>
        <center>
            <p>&copy; 2026 DiffCheck. by <a href="https://sagarmalla.info.np" target="_blank"
                    rel="noopener noreferrer">Sagar Malla</a> </p>
        </center>
    </footer>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: false,
            mirror: true
        });
    </script>
    <script src="assets/script.js"></script>
</body>

</html>
